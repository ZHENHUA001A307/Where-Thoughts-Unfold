name: EPUB to RSS Pusher

on:
  schedule:
    - cron: '0 0 */3 * *' # 每两天运行一次
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install ebooklib beautifulsoup4 lxml

      - name: Run Script
        run: |
          python <<EOF
          import os
          import datetime
          import ebooklib
          import zipfile
          import re
          import math
          from ebooklib import epub
          from bs4 import BeautifulSoup

          # ================= 配置区 =================
          # 您可以根据自己的阅读习惯调整这里的数字
          # 普通人中文阅读速度约为 300-500 字/分钟
          READING_SPEED = 350 
          # ==========================================

          # 1. 读取进度数字
          try:
              with open('progress.txt', 'r') as f:
                  current_index = int(f.read().strip())
          except:
              current_index = 1

          # 2. 扫描文件夹
          search_str = f"{current_index:0>3}"
          target_file = None
          if os.path.exists('books'):
              for f in os.listdir('books'):
                  if search_str in f and f.lower().endswith('.epub'):
                      target_file = os.path.join('books', f)
                      break

          if not target_file:
              print(f"DEBUG: 没找到序号 {search_str} 的文件，跳过本次更新。")
              exit(0)

          # 3. 解析内容 (带崩溃恢复)
          content_html = ""
          try:
              book = epub.read_epub(target_file)
              for item in book.get_items_of_type(ebooklib.ITEM_DOCUMENT):
                  soup = BeautifulSoup(item.get_content(), 'html.parser')
                  for img in soup.find_all('img'): img.decompose()
                  body = soup.find('body')
                  if body: content_html += "".join([str(c) for c in body.contents])
          except:
              with zipfile.ZipFile(target_file, 'r') as z:
                  content_files = sorted([f for f in z.namelist() if f.lower().endswith(('.html', '.xhtml'))])
                  for f_name in content_files:
                      with z.open(f_name) as f:
                          soup = BeautifulSoup(f.read(), 'html.parser')
                          for img in soup.find_all('img'): img.decompose()
                          body = soup.find('body')
                          if body: content_html += "".join([str(c) for c in body.contents])

          # --- 计算阅读时间逻辑 ---
          # 1. 临时去掉 HTML 标签统计纯文字字数
          temp_soup = BeautifulSoup(content_html, 'html.parser')
          pure_text = temp_soup.get_text()
          word_count = len(pure_text.strip())
          
          # 2. 计算分钟（向上取整）
          reading_time = math.ceil(word_count / READING_SPEED)
          
          # 3. 构造时间提示行，并拼接到正文最前面
          time_header = f"<p style='color: #888;'>⏱ 预计阅读时间：{reading_time} 分钟 ({word_count} 字)</p><hr>"
          content_html = time_header + content_html
          # -----------------------

          # 4. 构造当前的新条目 (New Item)
          pub_date = datetime.datetime.now().strftime('%a, %d %b %Y %H:%M:%S +0000')
          file_name = os.path.basename(target_file)
          new_item = f"""        <item>
              <title>{file_name}</title>
              <description><![CDATA[{content_html}]]></description>
              <pubDate>{pub_date}</pubDate>
              <guid isPermaLink="false">{current_index}</guid>
          </item>"""

          # 5. 读取旧条目并合并
          all_items = [new_item]
          if os.path.exists('feed.xml'):
              with open('feed.xml', 'r', encoding='utf-8') as f:
                  old_feed = f.read()
                  old_items = re.findall(r'<item>.*?</item>', old_feed, re.DOTALL)
                  all_items.extend(old_items)

          # 只保留最近 15 条
          all_items = all_items[:15]
          items_html = "\n".join(all_items)

          # 6. 生成最终的 RSS 文件
          rss_feed = f"""<?xml version="1.0" encoding="UTF-8" ?>
          <rss version="2.0">
          <channel>
              <title>我的每日小说</title>
              <link>https://github.com/${{ github.repository }}</link>
              <description>从 EPUB 自动生成的 RSS 订阅源</description>
          {items_html}
          </channel>
          </rss>"""

          with open('feed.xml', 'w', encoding='utf-8') as f:
              f.write(rss_feed)

          # 7. 更新进度
          with open('progress.txt', 'w') as f:
              f.write(str(current_index + 1))
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml progress.txt
          git commit -m "Update RSS: Added chapter with reading time" || echo "Nothing to commit"
          git push
